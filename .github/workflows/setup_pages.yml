name: Setup Fixed Pages

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests urllib3
      - name: Run setup
        run: python setup_pages.py
        env:
          TOUSHI_WP_USERNAME: ${{ secrets.TOUSHI_WP_USERNAME }}
          TOUSHI_WP_APP_PASSWORD: ${{ secrets.TOUSHI_WP_APP_PASSWORD }}
