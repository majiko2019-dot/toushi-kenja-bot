name: Post 5 Articles (No Affiliate)

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: pip install anthropic httpx requests urllib3 Pillow
      - name: Run post 5 articles
        run: python post_5_articles.py
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TOUSHI_WP_USERNAME: ${{ secrets.TOUSHI_WP_USERNAME }}
          TOUSHI_WP_APP_PASSWORD: ${{ secrets.TOUSHI_WP_APP_PASSWORD }}
